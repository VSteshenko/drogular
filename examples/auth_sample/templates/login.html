<h2>Login</h2>

<p>
    Try:
    <strong>admin / password</strong>
    or
    <strong>user / password</strong>
</p>

<form method="post" action="/login">
    <label>
        Username
        <input name="username" />
    </label>

    <br />

    <label>
        Password
        <input name="password" type="password" />
    </label>

    <br />

    <button type="submit">Login</button>
</form>
