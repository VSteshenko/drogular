<header>
    <div style="display:flex; align-items:center; gap:1rem;">
        <h1 style="margin-right:auto;">{{ appTitle }}</h1>
    </div>

    @if(isAuthenticated)
        <nav>
            <a href="/dashboard">{{ navDashboard }}</a>
            |
            <a href="/users">{{ navUsers }}</a>
            |
            <a href="/projects">{{ navProjects }}</a>
            |
            @if(isAdmin)
            |
            <a href="/admin">{{ navAdmin }}</a>
            @endif
            |
            <form method="post" action="/logout" style="display:inline">
                <button
                        type="submit"
                        style="border:none; background:none; padding:0; color:blue; text-decoration:underline; cursor:pointer;">
                    {{ navLogout }}
                </button>
            </form>
        </nav>
    @endif

    <div style="display:flex; align-items:center; gap:0.75rem;">
        @if(isAuthenticated)
            <small>
                {{ headerSignedInAs }}: {{ currentUsername }}
            </small>
        @endif

        <div>
            <form method="post" action="/language" style="display:inline">
                <input type="hidden" name="language" value="en">
                <input type="hidden" name="redirect" value="{{ currentPath }}">
                <button type="submit" @if(isEnglish)disabled@endif>
                    EN
                </button>
            </form>

            <form method="post" action="/language" style="display:inline">
                <input type="hidden" name="language" value="de">
                <input type="hidden" name="redirect" value="{{ currentPath }}">
                <button type="submit" @if(isGerman)disabled@endif>
                    DE
                </button>
            </form>
        </div>
    </div>

    <hr>
</header>
